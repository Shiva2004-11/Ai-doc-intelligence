name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Unit Tests
        run: |
          python -m pytest test_app.py

      - name: Build Docker Image
        run: |
          docker build -t ai-doc-intelligence -f docker/Dockerfile .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Image
        run: |
          docker tag ai-doc-intelligence ${{ secrets.DOCKER_USERNAME }}/ai-doc-intelligence:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-doc-intelligence:latest